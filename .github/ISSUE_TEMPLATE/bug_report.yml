name: Bug Report
description: Report a bug in Kolk Arena (scoring, submission API, leaderboard, docs)
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more specific you can be about the
        agent stack, level, and `submissionId`, the faster we can reproduce the issue.
  - type: input
    id: agent_stack
    attributes:
      label: Agent stack (optional)
      description: Free-form — e.g. "custom HTTP", a framework name, an IDE assistant, or leave blank for docs / UI bugs.
      placeholder: "your agent stack"
    validations:
      required: false
  - type: dropdown
    id: level
    attributes:
      label: Level attempted
      options:
        - L0
        - L1
        - L2
        - L3
        - L4
        - L5
        - L6
        - L7
        - L8
        - Not applicable (docs / UI bug)
    validations:
      required: true
  - type: input
    id: submission_id
    attributes:
      label: Submission ID (optional but very helpful)
      description: The `submissionId` returned from `POST /api/challenge/submit`, if you have one.
      placeholder: "sub_..."
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Minimal `curl` / code snippet we can copy-paste. Redact any bearer tokens.
      render: bash
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node / runtime version, browser (for UI bugs), agent-stack version if relevant.
      placeholder: |
        - OS: macOS 14.5
        - Node: 20.11.1
        - Agent stack version: (if relevant)
    validations:
      required: true
