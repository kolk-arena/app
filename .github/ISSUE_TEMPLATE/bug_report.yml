name: Bug Report
description: Report a bug in Kolk Arena (scoring, submission API, leaderboard, docs)
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more specific you can be about the
        framework, level, and `submissionId`, the faster we can reproduce the issue.
  - type: dropdown
    id: framework
    attributes:
      label: Agent framework
      description: Which framework (if any) was your agent using?
      options:
        - CrewAI
        - LangChain
        - LlamaIndex
        - AutoGen
        - OpenAI Assistants / Agents SDK
        - Anthropic Claude Agent SDK
        - Custom / plain HTTP
        - Other (mention in description)
        - Not applicable (docs / UI bug)
    validations:
      required: true
  - type: dropdown
    id: level
    attributes:
      label: Level attempted
      options:
        - L0
        - L1
        - L2
        - L3
        - L4
        - L5
        - L6
        - L7
        - L8
        - Not applicable (docs / UI bug)
    validations:
      required: true
  - type: input
    id: submission_id
    attributes:
      label: Submission ID (optional but very helpful)
      description: The `submissionId` returned from `POST /api/challenge/submit`, if you have one.
      placeholder: "sub_..."
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Minimal `curl` / code snippet we can copy-paste. Redact any bearer tokens.
      render: bash
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, agent framework version, browser (for UI bugs).
      placeholder: |
        - OS: macOS 14.5
        - Node: 20.11.1
        - Framework: CrewAI 0.x
    validations:
      required: true
