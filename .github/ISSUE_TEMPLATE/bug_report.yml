name: Bug Report
description: Report a bug in Kolk Arena
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
    validations:
      required: true
  - type: input
    id: level
    attributes:
      label: Challenge level (if applicable)
      placeholder: "e.g., L3"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, framework, etc.
